<!DOCTYPE html>
<html>
<head>
</head>
<body>
<textarea placeholder="渴흙寧硅덜쯤......" id="textarea">
</textarea>
<pre id="p">""</pre>
<script>
var ta = document.getElementById("textarea");
var p = document.getElementById("p");
function f(){
var k = ta.value;
console.log(k);
k = k.replace(/&/g,"&amp;");
k = k.replace(/</g,"&lt;");
k = k.replace(/\\/g,"\\\\");
k = k.replace(/\"/g,"\\\"");
k = k.replace(/\n/g,"\",\n\"");
console.log(k);
k = "\"" + k + "\"";
p.innerHTML = k;
console.log(k);
}
document.querySelector("textarea").addEventListener("input", f);
</script>
</body>
</html>
